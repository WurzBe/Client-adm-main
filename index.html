<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motor de Rotas - Sincronização Inteligente</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-principal: #0f172a; --bg-card: #1e293b; --bg-input: #334155;
            --cor-primaria: #38bdf8; --cor-primaria-hover: #0ea5e9;
            --texto-principal: #f8fafc; --texto-secundario: #94a3b8;
            --borda: #334155; --sombra-card: rgba(0, 0, 0, 0.2);
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background-color: var(--bg-principal); color: var(--texto-principal); overflow: hidden; }
        
        @media (max-width: 768px) { body { flex-direction: column-reverse; } #sidebar { width: 100% !important; height: 50vh; border-right: none; border-top: 1px solid var(--borda); } #map { height: 50vh; } }
        
        #sidebar { width: 420px; background: var(--bg-principal); border-right: 1px solid var(--borda); display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 20px rgba(0,0,0,0.4); position: relative; }
        .header { padding: 20px 20px; background: var(--bg-card); border-bottom: 1px solid var(--borda); display: flex; justify-content: space-between; align-items: center; }
        .header h3 { margin: 0 0 4px 0; font-size: 19px; font-weight: 700; letter-spacing: -0.5px; }
        .header p { margin: 0; font-size: 11px; color: var(--texto-secundario); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        
        .badge-otimizado { background: rgba(56, 189, 248, 0.15); color: var(--cor-primaria); font-size: 10px; padding: 4px 8px; border-radius: 20px; font-weight: 700; border: 1px solid rgba(56, 189, 248, 0.3); vertical-align: middle; margin-left: 8px;}

        #aviso-pos-login { background: rgba(16, 185, 129, 0.12); border-bottom: 1px solid rgba(16, 185, 129, 0.3); padding: 12px 20px; font-size: 12px; color: #10b981; font-weight: 500; line-height: 1.4; display: flex; align-items: center; gap: 10px; }
        #aviso-pos-login button { background: transparent; border: none; color: var(--texto-secundario); cursor: pointer; font-weight: bold; margin-left: auto; }

        .conteudo-aba { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .aba-escondida { display: none !important; }
        
        .filtros, .busca-container { padding: 16px 20px; background: var(--bg-principal); display: flex; gap: 10px; border-bottom: 1px solid var(--borda); flex-wrap: wrap; }
        .filtros select, .busca-container input { flex: 1; min-width: 120px; padding: 12px; border-radius: 8px; background: var(--bg-input); border: 1px solid transparent; color: var(--texto-principal); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; -webkit-appearance: none; appearance: none; cursor: pointer; }
        .filtros select:focus, .busca-container input:focus { border-color: var(--cor-primaria); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
        
        .lista-scroll { padding: 20px; overflow-y: auto; flex: 1; background: var(--bg-principal); padding-bottom: 30px; }
        .lista-scroll::-webkit-scrollbar { width: 6px; }
        .lista-scroll::-webkit-scrollbar-thumb { background: var(--borda); border-radius: 3px; }
        
        .card-item { background: var(--bg-card); border-left: 5px solid var(--cor-primaria); padding: 16px; margin-bottom: 14px; border-radius: 12px; box-shadow: 0 4px 12px var(--sombra-card); cursor: pointer; transition: all 0.2s ease; }
        .card-item:hover { transform: translateY(-3px); background: #233147; }
        .card-item h4 { margin: 0 0 8px 0; color: var(--texto-principal); font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
        .card-item p { margin: 4px 0; font-size: 12px; color: var(--texto-secundario); line-height: 1.5; }
        
        .btn-acao { display: inline-flex; align-items: center; justify-content: center; padding: 10px 16px; background: var(--cor-primaria); color: #0f172a; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s ease; width: 100%; box-sizing: border-box; text-align: center; }
        .btn-acao:hover { background: var(--cor-primaria-hover); }
        .btn-secundario { background: rgba(56, 189, 248, 0.1); color: var(--cor-primaria); border: 1px solid var(--cor-primaria); margin-top: 10px;}
        .btn-secundario:hover { background: var(--cor-primaria); color: #0f172a; }
        
        .form-exclusivo { padding: 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; background: var(--bg-principal); }
        #painelEdicao { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-principal); z-index: 2000; display: flex; flex-direction: column; }
        .form-exclusivo label { font-size: 11px; color: var(--texto-secundario); text-transform: uppercase; margin-bottom: -6px; font-weight: 700; }
        .form-exclusivo input, .form-exclusivo select { padding: 12px; background: var(--bg-input); border: 1px solid transparent; border-radius: 8px; color: var(--texto-principal); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; }
        
        #loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; text-align: center; backdrop-filter: blur(4px); }
        .spinner { border: 4px solid var(--borda); border-top: 4px solid var(--cor-primaria); border-radius: 50%; width: 36px; height: 36px; animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .barra-inferior { height: 65px; background: var(--bg-card); border-top: 1px solid var(--borda); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -4px 10px rgba(0,0,0,0.2); }
        .btn-tab { flex: 1; height: 100%; background: transparent; border: none; color: var(--texto-secundario); font-size: 11px; font-weight: 600; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; transition: all 0.2s ease; font-family: 'Inter', sans-serif; }
        .btn-tab.ativo { color: var(--cor-primaria); background: rgba(56, 189, 248, 0.08); }
        
        #map { flex: 1; height: 100%; background: #e5e3df; z-index: 1; }
        .leaflet-popup-content-wrapper { background: var(--bg-card) !important; color: var(--texto-principal) !important; border-radius: 12px !important; border: 1px solid var(--borda); box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important; }
        .leaflet-popup-tip { background: var(--bg-card) !important; }

        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-principal); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-card { background: var(--bg-card); padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid var(--borda); max-width: 400px; width: 100%; text-align: center; }
        .login-card h2 { margin: 0 0 10px 0; color: var(--cor-primaria); font-size: 24px; font-weight: 700; }
        .login-card p { color: var(--texto-secundario); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .login-card input { width: 100%; padding: 14px; background: var(--bg-input); border: 1px solid var(--borda); border-radius: 8px; color: var(--texto-principal); font-size: 14px; margin-bottom: 16px; box-sizing: border-box; outline: none; }
        .msg-erro-auth { color: #f43f5e; font-size: 13px; margin-top: 12px; font-weight: 600; }
        .btn-sair { background: transparent; border: 1px solid var(--texto-secundario); color: var(--texto-secundario); font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tela-login" class="auth-overlay">
        <div class="login-card">
            <h2>Rota Pro SaaS</h2>
            <p>Entre para espelhar suas rotas com sua planilha em tempo real.</p>
            <input type="email" id="login-email" placeholder="E-mail corporativo">
            <input type="password" id="login-senha" placeholder="Sua Senha">
            <button class="btn-acao" onclick="fazerLogin()">Entrar no Sistema</button>
            <button style="background:none; border:none; color:var(--texto-secundario); font-size:12px; margin-top:15px; cursor:pointer; text-decoration:underline;" onclick="criarConta()">Não tem conta? Criar clicando aqui</button>
            <p id="msg-login" class="msg-erro-auth"></p>
        </div>
    </div>

    <div id="sidebar">
        <div class="header">
            <div>
                <h3>Visão Operacional <span class="badge-otimizado" id="badgeOtimizado" style="display:none;">IA</span></h3>
                <p id="status">Sincronizando...</p>
            </div>
            <button class="btn-sair" onclick="auth.signOut()">Sair</button>
        </div>

        <div id="aviso-pos-login" style="display: none;">
            <span>🔄 <b>Planilha Conectada:</b> Qualquer alteração feita aqui atualizará seu Drive automaticamente!</span>
            <button onclick="document.getElementById('aviso-pos-login').style.display='none'">✕</button>
        </div>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <span id="loading-text" style="font-size: 13px; color: var(--cor-primaria); font-weight: 600;">Processando...</span>
        </div>

        <div id="conteudoAgenda" class="conteudo-aba">
            <div class="filtros">
                <select id="filtroSemana">
                    <option value="Semana 1">Semana 1</option><option value="Semana 2">Semana 2</option>
                    <option value="Semana 3">Semana 3</option><option value="Semana 4">Semana 4</option>
                </select>
                <select id="filtroDia">
                    <option value="Segunda-Feira">Segunda-Feira</option><option value="Terça-Feira">Terça-Feira</option>
                    <option value="Quarta-Feira">Quarta-Feira</option><option value="Quinta-Feira">Quinta-Feira</option>
                </select>
                <button class="btn-acao" style="background-color: #10b981; color: white;" onclick="exportarRotaDoDia()">📥 Baixar Rota Diária</button>
            </div>
            <div class="lista-scroll" id="listaAgenda"></div>
        </div>

        <div id="conteudoClientes" class="conteudo-aba aba-escondida">
            <div class="busca-container" style="flex-direction: column; gap: 10px;">
                <input type="text" id="campoBusca" placeholder="Filtrar base de dados..." oninput="filtrarListaGeral()">
                
                <div style="background: var(--bg-card); padding: 12px; border-radius: 8px; border: 1px solid var(--borda);">
                    <label style="font-size: 10px; color: var(--texto-secundario); font-weight: bold; text-transform: uppercase;">🔗 URL do Script do Google Drive</label>
                    <input type="text" id="urlScriptDrive" placeholder="Cole a URL da Implantação do Apps Script" style="margin-top:6px; font-size:12px; padding:8px; width:100%; box-sizing:border-box;">
                    <button class="btn-acao" style="font-size:11px; padding:6px; margin-top:8px; background:#ea580c; color:white;" onclick="vincularESincronizarPlanilha()">Sincronizar com o Drive</button>
                </div>
            </div>
            <div class="lista-scroll" id="listaClientesGeral"></div>

            <div id="painelEdicao" class="aba-escondida">
                <div class="form-exclusivo">
                    <b style="color: var(--cor-primaria); font-size: 17px;">Editar Cadastro</b>
                    <label>Código Único</label><input type="text" id="editCodigo" readonly style="opacity:0.6;">
                    <label>Razão Social</label><input type="text" id="editNome">
                    <label>Endereço</label><input type="text" id="editEndereco">
                    <label>Complemento</label><input type="text" id="editComplemento">
                    <label>Bairro</label><input type="text" id="editBairro">
                    <label>Cidade</label><select id="editCidade"><option value="Blumenau">Blumenau</option><option value="Brusque">Brusque</option><option value="Indaial">Indaial</option><option value="Pomerode">Pomerode</option><option value="Gaspar">Gaspar</option><option value="Botuverá">Botuverá</option></select>
                    <label>Semana</label><select id="editSemana"><option value="Semana 1">Semana 1</option><option value="Semana 2">Semana 2</option><option value="Semana 3">Semana 3</option><option value="Semana 4">Semana 4</option></select>
                    <label>Dia da Rota</label><select id="editDia"><option value="Segunda-Feira">Segunda-Feira</option><option value="Terça-Feira">Terça-Feira</option><option value="Quarta-Feira">Quarta-Feira</option><option value="Quinta-Feira">Quinta-Feira</option></select>
                    <button class="btn-acao" onclick="salvarDuploEdicao()">Salvar em Ambos</button>
                    <button class="btn-acao btn-secundario" style="border-color:#f43f5e; color:#f43f5e;" onclick="excluirDuplo()">🗑️ Remover Cliente</button>
                    <button class="btn-acao btn-secundario" onclick="fecharPainelEdicao()">Voltar</button>
                </div>
            </div>
        </div>

        <div id="conteudoAdicionar" class="conteudo-aba aba-escondida">
            <div class="form-exclusivo">
                <b style="color: var(--cor-primaria); font-size: 17px;">Novo Registro</b>
                <label>Código Identificador</label><input type="text" id="addCodigo" placeholder="Ex: 1045">
                <label>Razão Social</label><input type="text" id="addNome">
                <label>Endereço Completo</label><input type="text" id="addEndereco">
                <label>Complemento</label><input type="text" id="addComplemento">
                <label>Bairro</label><input type="text" id="addBairro">
                <label>Cidade</label><select id="addCidade"><option value="Blumenau">Blumenau</option><option value="Brusque">Brusque</option><option value="Indaial">Indaial</option><option value="Pomerode">Pomerode</option><option value="Gaspar">Gaspar</option><option value="Botuverá">Botuverá</option></select>
                <label>Semana</label><select id="addSemana"><option value="Semana 1">Semana 1</option><option value="Semana 2">Semana 2</option><option value="Semana 3">Semana 3</option><option value="Semana 4">Semana 4</option></select>
                <label>Dia da Rota</label><select id="addDia"><option value="Segunda-Feira">Segunda-Feira</option><option value="Terça-Feira">Terça-Feira</option><option value="Quarta-Feira">Quarta-Feira</option><option value="Quinta-Feira">Quinta-Feira</option></select>
                <button class="btn-acao" onclick="salvarDuploNovo()">Cadastrar e Sincronizar</button>
            </div>
        </div>

        <div class="barra-inferior">
            <button id="btnTabAgenda" class="btn-tab ativo" onclick="mudarAba('agenda')"><span style="font-size:18px;">🗺️</span><span>Rotas</span></button>
            <button id="btnTabClientes" class="btn-tab" onclick="mudarAba('clientes')"><span style="font-size:18px;">👥</span><span>Base</span></button>
            <button id="btnTabAdicionar" class="btn-tab" onclick="mudarAba('adicionar')"><span style="font-size:18px;">➕</span><span>Novo</span></button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAh0OpiVBN_tAmziVvvZS8ONHjfvrKZnqU",
            authDomain: "rota-comercial.firebaseapp.com",
            projectId: "rota-comercial",
            storageBucket: "rota-comercial.firebasestorage.app",
            messagingSenderId: "828175392312",
            appId: "1:828175392312:web:f3bc6f4fe373b995ad90cd"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const map = L.map('map', { zoomControl: false }).setView([-26.9166, -49.0661], 12);
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri' }).addTo(map);

        let grupoMarcadores = L.layerGroup().addTo(map);
        let grupoRota = L.layerGroup().addTo(map);
        let bancoDeDadosClientes = [];
        let clienteSelecionadoAtualmente = null;
        let minhaPosicaoGPS = null;
        let marcadoresAtivosMap = [];
        let relatorioAtual = [];
        let usuarioAtual = null;
        let scriptUrlVinculado = "";

        const paletaCores = ['#38bdf8', '#8b5cf6', '#f43f5e', '#f59e0b', '#10b981', '#06b6d4', '#ec4899'];

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                usuarioAtual = user;
                document.getElementById('tela-login').style.display = 'none';
                
                const docConfig = await db.collection("configuracoes").doc(user.uid).get();
                if(docConfig.exists && docConfig.data().scriptUrl) {
                    scriptUrlVinculado = docConfig.data().scriptUrl;
                    document.getElementById('urlScriptDrive').value = scriptUrlVinculado;
                    document.getElementById('aviso-pos-login').style.display = 'flex';
                }
                puxarDadosLocaisFirebase();
            } else {
                usuarioAtual = null;
                document.getElementById('tela-login').style.display = 'flex';
                document.getElementById('status').innerText = "Desconectado";
            }
        });

        window.fazerLogin = () => {
            const e = document.getElementById('login-email').value;
            const s = document.getElementById('login-senha').value;
            auth.signInWithEmailAndPassword(e, s).catch(err => document.getElementById('msg-login').innerText = "Erro: " + err.message);
        };

        window.criarConta = () => {
            const e = document.getElementById('login-email').value;
            const s = document.getElementById('login-senha').value;
            if(s.length < 6) { document.getElementById('msg-login').innerText = "Senha deve ter 6+ caracteres."; return; }
            auth.createUserWithEmailAndPassword(e, s).catch(err => document.getElementById('msg-login').innerText = "Erro: " + err.message);
        };

        window.mudarAba = (aba) => {
            window.fecharPainelEdicao();
            const t = { agenda: 'conteudoAgenda', clientes: 'conteudoClientes', adicionar: 'conteudoAdicionar' };
            Object.keys(t).forEach(k => {
                document.getElementById(t[k]).classList.add('aba-escondida');
                document.getElementById('btnTab' + k.charAt(0).toUpperCase() + k.slice(1)).classList.remove('ativo');
            });
            document.getElementById(t[aba]).classList.remove('aba-escondida');
            document.getElementById('btnTab' + aba.charAt(0).toUpperCase() + aba.slice(1)).classList.add('ativo');
        };

        async function puxarDadosLocaisFirebase() {
            document.getElementById('status').innerText = "Sincronizando banco...";
            const snapshot = await db.collection("clientes").where("userId", "==", usuarioAtual.uid).get();
            bancoDeDadosClientes = [];
            snapshot.forEach(doc => { let c = doc.data(); c.idFirebase = doc.id; bancoDeDadosClientes.push(c); });
            if(!minhaPosicaoGPS) { minhaPosicaoGPS = await inicializarGPS(); }
            document.getElementById('status').innerText = "📍 Online: " + usuarioAtual.email;
            filtrarERenderizar();
            renderizarListaGeralClientes();
        }

        window.vincularESincronizarPlanilha = async () => {
            let url = document.getElementById('urlScriptDrive').value.trim();
            if(!url) return alert("Insira uma URL válida de implantação.");
            
            document.getElementById('status').innerText = "Limpando duplicados antigos...";
            try {
                await db.collection("configuracoes").doc(usuarioAtual.uid).set({ scriptUrl: url });
                scriptUrlVinculado = url;

                // CORREÇÃO DOS DUPLICADOS: Limpa os registros do Firebase de forma síncrona real
                const snapshotAntigo = await db.collection("clientes").where("userId", "==", usuarioAtual.uid).get();
                if (!snapshotAntigo.empty) {
                    const batch = db.batch();
                    snapshotAntigo.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                }

                document.getElementById('status').innerText = "Puxando novas linhas...";
                const res = await fetch(url, { method: "GET", redirect: "follow", headers: { "Accept": "application/json" } });
                const dadosPlanilha = await res.json();

                for(let c of dadosPlanilha) {
                    c.userId = usuarioAtual.uid;
                    await db.collection("clientes").add(c);
                }
                alert("Perfeito! Sua planilha do Drive foi clonada e limpa sem registros duplicados.");
                puxarDadosLocaisFirebase();
            } catch(e) {
                console.error(e);
                alert("Erro de sincronização. Verifique os passos de implantação da planilha.");
                document.getElementById('status').innerText = "Erro na sincronização";
            }
        };

        window.salvarDuploNovo = async () => {
            const pct = {
                userId: usuarioAtual.uid,
                codigo: document.getElementById('addCodigo').value.trim(),
                nome: document.getElementById('addNome').value.trim(),
                endereco: document.getElementById('addEndereco').value.trim(),
                complemento: document.getElementById('addComplemento').value.trim(),
                bairro: document.getElementById('addBairro').value.trim(),
                cidade: document.getElementById('addCidade').value,
                semana: document.getElementById('addSemana').value,
                diaSemana: document.getElementById('addDia').value
            };
            if(!pct.codigo || !pct.nome) return alert("Preencha o Código e a Razão Social.");

            document.getElementById('status').innerText = "Salvando duplo...";
            try {
                await db.collection("clientes").add(pct);
                if(scriptUrlVinculado) {
                    pct.acao = "salvar";
                    fetch(scriptUrlVinculado, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(pct) });
                }
                window.mudarAba('agenda');
                puxarDadosLocaisFirebase();
            } catch(e) { alert("Erro ao salvar."); }
        };

        window.salvarDuploEdicao = async () => {
            if(!clienteSelecionadoAtualmente) return;
            const pct = {
                codigo: document.getElementById('editCodigo').value,
                nome: document.getElementById('editNome').value.trim(),
                endereco: document.getElementById('editEndereco').value.trim(),
                complemento: document.getElementById('editComplemento').value.trim(),
                bairro: document.getElementById('editBairro').value.trim(),
                cidade: document.getElementById('editCidade').value,
                semana: document.getElementById('editSemana').value,
                diaSemana: document.getElementById('editDia').value
            };

            document.getElementById('status').innerText = "Espelhando edições...";
            try {
                await db.collection("clientes").doc(clienteSelecionadoAtualmente.idFirebase).update(pct);
                if(scriptUrlVinculado) {
                    pct.acao = "editar";
                    fetch(scriptUrlVinculado, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(pct) });
                }
                window.fecharPainelEdicao();
                puxarDadosLocaisFirebase();
            } catch(e) { alert("Erro ao editar."); }
        };

        window.excluirDuplo = async () => {
            if(!clienteSelecionadoAtualmente || !confirm("Quer deletar este cliente do App e da Planilha do Drive?")) return;
            document.getElementById('status').innerText = "Removendo em ambos...";
            try {
                await db.collection("clientes").doc(clienteSelecionadoAtualmente.idFirebase).delete();
                if(scriptUrlVinculado) {
                    const dadosEnvio = { codigo: clienteSelecionadoAtualmente.codigo, acao: "excluir" };
                    fetch(scriptUrlVinculado, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dadosEnvio) });
                }
                window.fecharPainelEdicao();
                puxarDadosLocaisFirebase();
            } catch(e) { alert("Erro ao deletar."); }
        };

        window.exportarRotaDoDia = () => {
            if(relatorioAtual.length === 0) return alert("Nenhuma rota carregada.");
            let csv = "\uFEFFOrdem,Codigo,Nome,Endereco,Bairro,Cidade\n";
            relatorioAtual.forEach((c, i) => csv += `${i+1},${c.codigo},"${c.nome}","${c.endereco}","${c.bairro}","${c.cidade}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Rota_${document.getElementById('filtroDia').value}.csv`);
            link.click();
        };

        async function inicializarGPS() {
            return new Promise((r) => {
                if(!navigator.geolocation) r(null);
                else navigator.geolocation.getCurrentPosition(p => r([p.coords.latitude, p.coords.longitude]), e => r(null), {timeout:4000});
            });
        }

        async function descobrirCoordenadaReal(endereco, city) {
            let buscaCompleta = encodeURIComponent(`${endereco.replace(/"/g, '')}, ${city}, SC, Brasil`);
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${buscaCompleta}&limit=1`);
                const dados = await res.json();
                if (dados && dados.length > 0) return [parseFloat(dados[0].lat), parseFloat(dados[0].lon)];
            } catch(e){}
            const d = { "Blumenau": [-26.9194, -49.0661], "Brusque": [-27.0978, -48.9112], "Indaial": [-26.8978, -49.2400], "Pomerode": [-26.7410, -49.1762], "Gaspar": [-26.9325, -48.9560], "Botuverá": [-27.1997, -49.0750] };
            return d[city] || [-26.9166, -49.0661];
        }

        window.focarNoClienteDoMapa = (lat, lng, codigo) => {
            map.setView([lat, lng], 16);
            let alvo = marcadoresAtivosMap.find(m => m.codigo.toString().trim() === codigo.toString().trim());
            if (alvo) { alvo.marker.openPopup(); }
        };

        async function filtrarERenderizar() {
            const semSel = document.getElementById('filtroSemana').value;
            const diaSel = document.getElementById('filtroDia').value;
            const clientesDoDia = bancoDeDadosClientes.filter(c => c.semana === semSel && c.diaSemana === diaSel);

            grupoMarcadores.clearLayers(); 
            grupoRota.clearLayers();
            marcadoresAtivosMap = [];
            relatorioAtual = [];
            document.getElementById('badgeOtimizado').style.display = 'none';
            
            const container = document.getElementById('listaAgenda');
            container.innerHTML = ''; 

            if (clientesDoDia.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding-top:30px; color:var(--texto-secundario); font-size:13px;">Nenhuma rota registrada para hoje. 🎉</p>';
                return;
            }

            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').innerText = "Processando coordenadas reais...";
            
            let coordsOriginais = [];
            let usandoGPSLocal = false;

            if (minhaPosicaoGPS) { coordsOriginais.push(minhaPosicaoGPS); usandoGPSLocal = true; }

            for (let c of clientesDoDia) {
                let coord = await descobrirCoordenadaReal(c.endereco, c.cidade);
                coordsOriginais.push(coord);
                await new Promise(r => setTimeout(r, 1300)); // Delay estendido de 1.3s para estabilizar conexões do servidor de mapas
            }

            let rotaOrdenadaIndices = coordsOriginais.map((_, i) => i);
            let dadosTripGlobal = null;

            // MOTOR INTEGRADO OSRM TRIP: Otimiza e desenha o trajeto pelas ruas de uma vez só
            if (coordsOriginais.length > 1) {
                try {
                    document.getElementById('loading-text').innerText = "Traçando inteligência das ruas...";
                    let stringOSRM = coordsOriginais.map(c => `${c[1]},${c[0]}`).join(';');
                    
                    // Pedimos geometries=geojson e overview=full para receber o mapa completo das ruas
                    const res = await fetch(`https://router.project-osrm.org/trip/v1/driving/${stringOSRM}?roundtrip=false&source=first&geometries=geojson&overview=full`);
                    const dadosTrip = await res.json();
                    
                    if (dadosTrip.waypoints && dadosTrip.trips && dadosTrip.trips.length > 0) {
                        document.getElementById('badgeOtimizado').style.display = 'inline-block';
                        dadosTripGlobal = dadosTrip.trips[0]; // Guarda o desenho perfeito das ruas
                        
                        rotaOrdenadaIndices = dadosTrip.waypoints
                            .map((wp, idx) => ({ o: idx, idxOpt: wp.waypoint_index }))
                            .sort((a,b) => a.idxOpt - b.idxOpt)
                            .map(wp => wp.o);
                    }
                } catch(e){ console.error("Falha no OSRM Trip, usando rota linear reserva", e); }
            }

            rotaOrdenadaIndices.forEach((idxOrigem, ordemAtual) => {
                let coord = coordsOriginais[idxOrigem];

                if (usandoGPSLocal && idxOrigem === 0) {
                    L.circleMarker(coord, { color: '#38bdf8', fillColor: '#0f172a', fillOpacity: 1, radius: 8, weight: 3 })
                     .bindPopup('<b style="color:#38bdf8; font-family: Inter;">📍 Início da Rota</b>').addTo(grupoMarcadores);
                } else {
                    let clienteIndex = usandoGPSLocal ? idxOrigem - 1 : idxOrigem;
                    let c = clientesDoDia[clienteIndex];
                    relatorioAtual.push(c);
                    
                    let iReal = usandoGPSLocal ? ordemAtual - 1 : ordemAtual;
                    let corCard = paletaCores[iReal % paletaCores.length];

                    let popupDesign = `
                        <div style="font-family: 'Inter', sans-serif; min-width: 200px; padding: 2px;">
                            <b style="color: ${corCard}; font-size: 14px; display: block; margin-bottom: 6px;">Visita ${iReal + 1}: ${c.nome}</b>
                            <p style="margin: 4px 0; font-size: 11px; color: var(--texto-secundario);">📍 ${c.endereco}</p>
                        </div>
                    `;

                    let marker = L.marker(coord).bindPopup(popupDesign);
                    grupoMarcadores.addLayer(marker);
                    marcadoresAtivosMap.push({ codigo: c.codigo, marker: marker });
                    
                    const urlMaps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.endereco + ', ' + c.cidade)}`;
                    
                    container.innerHTML += `
                        <div class="card-item" style="border-left-color:${corCard};" onclick="window.focarNoClienteDoMapa(${coord[0]}, ${coord[1]}, '${c.codigo}')">
                            <h4 style="color:${corCard};">${iReal+1}. <span style="color:var(--texto-principal);">${c.nome}</span></h4>
                            <p><b>Bairro:</b> ${c.bairro} | <b>Cidade:</b> ${c.cidade}</p>
                            <p><b>Endereço:</b> ${c.endereco}</p>
                            ${c.complemento ? `<p style="color:${corCard}; font-size:11px; font-weight:500; margin: 4px 0;">${c.complemento}</p>` : ''}
                            <a href="${urlMaps}" target="_blank" style="display:inline-block; margin-top:8px; font-size:11px; color:${corCard}; text-decoration:none; font-weight:bold; border: 1px solid ${corCard}; padding: 4px 8px; border-radius: 6px;" onclick="event.stopPropagation();">🧭 Abrir GPS</a>
                        </div>
                    `;
                }
            });

            // REDESENHO TRAVADO NAS RUAS: Se o motor Trip retornou o trajeto completo, desenha ele direto sem picotar
            if (dadosTripGlobal && dadosTripGlobal.geometry && dadosTripGlobal.geometry.coordinates) {
                const pontosReaisDasRuas = dadosTripGlobal.geometry.coordinates.map(p => [p[1], p[0]]);
                let linhaPerfeita = L.polyline(pontosReaisDasRuas, {color: '#38bdf8', weight: 6, opacity: 0.85});
                grupoRota.addLayer(linhaPerfeita);
                map.fitBounds(linhaPerfeita.getBounds(), {padding:[40,40]});
            } else if (coordsOriginais.length > 1) {
                // Linha reserva em degradê caso o servidor global falhe
                let limitesReserva = L.latLngBounds();
                for (let i = 0; i < coordsOriginais.length - 1; i++) {
                    let linhaReta = L.polyline([coordsOriginais[i], coordsOriginais[i+1]], {color: paletaCores[i % paletaCores.length], weight: 4, dashArray: '6, 6', opacity: 0.7});
                    grupoRota.addLayer(linhaReta);
                    limitesReserva.extend(linhaReta.getBounds());
                }
                map.fitBounds(limitesReserva, {padding:[40,40]});
            } else if (coordsOriginais.length === 1) {
                map.setView(coordsOriginais[0], 15);
            }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        window.renderizarListaGeralClientes = () => {
            const container = document.getElementById('listaClientesGeral');
            container.innerHTML = '';
            bancoDeDadosClientes.forEach(c => {
                container.innerHTML += `<div class="card-item" style="border-left-color: var(--borda);" onclick="window.abrirPainelEdicao('${c.codigo}')"><h4>${c.nome}</h4><p>Código: ${c.codigo} | <b>${c.semana} (${c.diaSemana})</b></p></div>`;
            });
        };

        window.filtrarListaGeral = () => {
            const busca = document.getElementById('campoBusca').value.toLowerCase();
            const cards = document.getElementById('listaClientesGeral').getElementsByClassName('card-item');
            for (let card of cards) card.style.display = card.innerText.toLowerCase().includes(busca) ? 'block' : 'none';
        };

        window.abrirPainelEdicao = (codigo) => {
            const c = bancoDeDadosClientes.find(item => item.codigo.toString() === codigo.toString());
            if (!c) return;
            clienteSelecionadoAtualmente = c;
            ['Codigo', 'Nome', 'Endereco', 'Complemento', 'Bairro', 'Cidade', 'Semana', 'Dia'].forEach(k => document.getElementById(`edit${k}`).value = c[k.toLowerCase()] || c[k === 'Dia' ? 'diaSemana' : '']);
            document.getElementById('painelEdicao').classList.remove('aba-escondida');
        };

        window.fecharPainelEdicao = () => { document.getElementById('painelEdicao').classList.add('aba-escondida'); clienteSelecionadoAtualmente = null; };

        document.getElementById('filtroSemana').addEventListener('change', filtrarERenderizar);
        document.getElementById('filtroDia').addEventListener('change', filtrarERenderizar);
    </script>
</body>
</html>
